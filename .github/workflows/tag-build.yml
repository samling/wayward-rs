name: Tag Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  GTK4_LAYER_SHELL_VERSION: "1.3.0"
  RUST_VERSION: "1.93"

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build CI image
        run: |
          docker build \
            --build-arg GTK4_LAYER_SHELL_VERSION="${GTK4_LAYER_SHELL_VERSION}" \
            --build-arg RUST_VERSION="${RUST_VERSION}" \
            -t wayward-ci .

      - name: Build release binary
        run: |
          docker run --rm \
            -v "${PWD}:/workspace" \
            -w /workspace \
            wayward-ci \
            cargo build --locked --release

      - name: Package binary
        run: |
          mkdir -p dist
          tar -C target/release -czf dist/wayward-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz wayward

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wayward-${{ github.ref_name }}-x86_64-unknown-linux-gnu
          path: dist/*.tar.gz
          if-no-files-found: error

      - name: Attach artifact to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
